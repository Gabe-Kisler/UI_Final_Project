name: shiftsync
description: Shift management app for employers and employees.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.6.10
  cloud_functions: ^5.6.0
  firebase_auth: ^5.7.0
  firebase_core: ^3.15.2
  fl_chart: ^0.68.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  firebase_core_platform_interface: ^6.0.3
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
